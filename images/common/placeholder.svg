<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="paper" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#faf6ef"/>
      <stop offset="100%" style="stop-color:#e8dcc8"/>
    </linearGradient>
    <pattern id="texture" patternUnits="userSpaceOnUse" width="100" height="100">
      <rect width="100" height="100" fill="url(#paper)"/>
      <circle cx="20" cy="20" r="1" fill="#d4c4a8" opacity="0.3"/>
      <circle cx="60" cy="40" r="0.5" fill="#c4b498" opacity="0.2"/>
      <circle cx="80" cy="70" r="1.5" fill="#d4c4a8" opacity="0.25"/>
      <circle cx="30" cy="80" r="0.8" fill="#c4b498" opacity="0.2"/>
      <circle cx="50" cy="60" r="0.6" fill="#d4c4a8" opacity="0.3"/>
      <circle cx="90" cy="20" r="1" fill="#c4b498" opacity="0.2"/>
      <circle cx="10" cy="50" r="1.2" fill="#d4c4a8" opacity="0.25"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#texture)"/>
  <rect x="50" y="50" width="700" height="500" fill="none" stroke="#d4a85a" stroke-width="2" rx="4"/>
  <rect x="60" y="60" width="680" height="480" fill="none" stroke="#c4a070" stroke-width="1" stroke-dasharray="10,5"/>
  <text x="400" y="280" text-anchor="middle" fill="#8b7355" font-family="serif" font-size="24">图</text>
  <text x="400" y="320" text-anchor="middle" fill="#a08b70" font-family="serif" font-size="14">暂无图片</text>
</svg>
